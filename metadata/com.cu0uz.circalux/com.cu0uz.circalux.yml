Name: CircaLux
Summary: Circadian rhythm and Vitamin D optimization
Description: CircaLux is a native Android application designed to help users optimize their circadian rhythm and monitor Vitamin D synthesis through solar exposure and Red Light Therapy (RLT) sessions. It features real-time monitoring of UVI, Lux, and solar elevation using astronomical algorithms. It includes a scientific knowledge base, a solar compass for body exposure, and metabolic health tracking. Privacy is guaranteed with no Google Play Services, no trackers, and fully local storage.
